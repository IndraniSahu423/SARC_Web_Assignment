name: CI/CD Pipeline

# Trigger workflow on push to main and pull requests to main
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ============================================================================
  # Job 1: Test Auth Service
  # ============================================================================
  test-auth-service:
    name: Test Auth Service
    runs-on: ubuntu-latest
    
    steps:
      # Check out the code
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Set up Python 3.11
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      # Install dependencies from auth-service/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r auth-service/requirements.txt
      
      # Run Django system checks to validate configuration
      - name: Run Django checks
        working-directory: ./auth-service
        run: python manage.py check
      
      # Run authentication service tests
      - name: Run authentication service tests
        working-directory: ./auth-service
        run: python manage.py test authentication

  # ============================================================================
  # Job 2: Test Independent Backend
  # ============================================================================
  test-independent-backend:
    name: Test Independent Backend
    runs-on: ubuntu-latest
    
    steps:
      # Check out the code
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Set up Python 3.11
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      # Install dependencies from independent-website/backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r independent-website/backend/requirements.txt
      
      # Run Django system checks to validate configuration
      - name: Run Django checks
        working-directory: ./independent-website/backend
        run: python manage.py check
      
      # Run portal backend tests
      - name: Run portal backend tests
        working-directory: ./independent-website/backend
        run: python manage.py test portal

  # ============================================================================
  # Job 3: Build Docker Images
  # Runs after both test jobs pass successfully
  # ============================================================================
  build-docker:
    name: Build and Verify Docker Images
    runs-on: ubuntu-latest
    needs: [test-auth-service, test-independent-backend]
    
    steps:
      # Check out the code
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare environment file
        run: |
          cat > .env << 'EOF'
          POSTGRES_AUTH_USER=postgres
          POSTGRES_AUTH_PASSWORD=postgres
          POSTGRES_APP_USER=postgres
          POSTGRES_APP_PASSWORD=postgres
          AUTH_DJANGO_SECRET_KEY=ci-auth-secret-key-for-testing
          PORTAL_DJANGO_SECRET_KEY=ci-portal-secret-key-for-testing
          DJANGO_DEBUG=True
          DJANGO_ALLOWED_HOSTS=*
          VITE_AUTH_URL=http://localhost:8000
          VITE_PORTAL_URL=http://localhost:8001
          EOF

      - name: Verify Docker tooling
        run: |
          docker --version
          docker compose version || docker-compose version

      - name: Select compose command
        run: |
          if docker compose version >/dev/null 2>&1; then
            echo "COMPOSE_CMD=docker compose" >> $GITHUB_ENV
          elif docker-compose version >/dev/null 2>&1; then
            echo "COMPOSE_CMD=docker-compose" >> $GITHUB_ENV
          else
            echo "No docker compose command found"
            exit 127
          fi
      
      # Build all Docker images using Docker Compose v2
      - name: Build Docker images
        run: ${{ env.COMPOSE_CMD }} build
      
      - name: Start containers
        run: ${{ env.COMPOSE_CMD }} up -d
      
      - name: Wait for services to start
        run: sleep 20
      
      - name: Verify containers are running
        run: ${{ env.COMPOSE_CMD }} ps
      
      - name: Verify auth service health
        run: |
          curl -f http://localhost:8000/api/auth/verify/ || echo "Auth service endpoint check (expected 401 without token)"
      
      - name: Verify frontend health
        run: |
          curl -f http://localhost:3000/ || echo "Frontend health check"
      
      - name: Stop and remove containers
        if: always()
        run: ${{ env.COMPOSE_CMD }} down -v

  # ============================================================================
  # Job 4: Build Frontend (Node dependencies check)
  # ============================================================================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify Node and npm
        run: |
          node --version
          npm --version
      
      - name: Install dependencies
        working-directory: ./independent-website/frontend
        run: npm ci

      - name: Ensure vite binary is executable
        working-directory: ./independent-website/frontend
        run: chmod +x ./node_modules/.bin/vite || true
      
      - name: Build frontend
        working-directory: ./independent-website/frontend
        env:
          VITE_AUTH_URL: http://localhost:8000
          VITE_PORTAL_URL: http://localhost:8001
        run: node ./node_modules/vite/bin/vite.js build

  # ============================================================================
  # Job 5: Deploy Frontend to Vercel
  # Runs only on push to main (not on PR)
  # ============================================================================
  deploy-frontend-vercel:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_DEPLOY == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        working-directory: ./independent-website/frontend
        run: npm ci

      - name: Ensure vite binary is executable
        working-directory: ./independent-website/frontend
        run: chmod +x ./node_modules/.bin/vite || true

      - name: Build frontend
        working-directory: ./independent-website/frontend
        env:
          VITE_AUTH_URL: http://localhost:8000
          VITE_PORTAL_URL: http://localhost:8001
        run: node ./node_modules/vite/bin/vite.js build
      
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./independent-website/frontend
          production: true

  # ============================================================================
  # Job 6: Deploy Auth Service to Render
  # Runs only on push to main (not on PR)
  # ============================================================================
  deploy-auth-service:
    name: Deploy Auth Service to Render
    runs-on: ubuntu-latest
    needs: [test-auth-service, build-docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_DEPLOY == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy Auth Service to Render
        run: |
          curl -X POST https://api.render.com/deploy/srv-${{ secrets.RENDER_AUTH_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}
        continue-on-error: true

  # ============================================================================
  # Job 7: Deploy Portal Backend to Render
  # Runs only on push to main (not on PR)
  # ============================================================================
  deploy-portal-backend:
    name: Deploy Portal Backend to Render
    runs-on: ubuntu-latest
    needs: [test-independent-backend, build-docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_DEPLOY == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy Portal Backend to Render
        run: |
          curl -X POST https://api.render.com/deploy/srv-${{ secrets.RENDER_PORTAL_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}
        continue-on-error: true

  # ============================================================================
  # Job 8: Notify Deployment Status
  # ============================================================================
  notify-deployment:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-frontend-vercel, deploy-auth-service, deploy-portal-backend]
    if: always()
    
    steps:
      - name: Deployment Success
        if: ${{ needs.deploy-frontend-vercel.result == 'success' && needs.deploy-auth-service.result == 'success' && needs.deploy-portal-backend.result == 'success' }}
        run: echo "✅ All deployments completed successfully!"
      
      - name: Deployment Failed
        if: failure()
        run: echo "❌ Some deployments failed. Check logs above."
